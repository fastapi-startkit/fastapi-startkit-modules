<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI + Vite</title>
    {{ vite('resources/js/app.ts') }}
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen font-sans">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center transform transition-all hover:scale-[1.01]">
        <div class="mb-6 inline-block bg-indigo-500/10 text-indigo-400 px-4 py-1 rounded-full text-sm font-semibold border border-indigo-500/20">
            ⚡ Vite + FastAPI
        </div>
        
        <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
            FastAPI StartKit
        </h1>
        
        <p class="text-slate-400 mb-8 text-sm">
            Interactive counter demo with HMR and Tailwind CSS.
        </p>

        <div class="bg-slate-900/50 rounded-xl p-6 border border-slate-700 mb-8">
            <div class="text-5xl font-mono font-bold text-indigo-400 mb-4" id="count">0</div>
            <div class="flex items-center justify-center space-x-4">
                <button 
                    id="decrement"
                    class="bg-slate-700 hover:bg-slate-600 active:bg-slate-800 text-white px-6 py-3 rounded-lg font-bold transition-all border border-slate-600 flex items-center justify-center space-x-2 group"
                >
                    <span class="group-hover:-translate-x-1 transition-transform">←</span>
                    <span>Down</span>
                </button>
                <button 
                    id="increment"
                    class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white px-6 py-3 rounded-lg font-bold transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center space-x-2 group"
                >
                    <span>Up</span>
                    <span class="group-hover:translate-x-1 transition-transform">→</span>
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 text-left">
            <div class="text-xs text-slate-400 bg-slate-700/30 p-3 rounded-lg border border-slate-600">
                <div class="text-indigo-400 font-bold mb-1">HMR</div>
                Edit this file to see instant updates.
            </div>
            <div class="text-xs text-slate-400 bg-slate-700/30 p-3 rounded-lg border border-slate-600">
                <div class="text-indigo-400 font-bold mb-1">Bundling</div>
                Assets are optimized for production.
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-700 text-[10px] text-slate-500 uppercase tracking-widest font-bold">
            Powered by FastAPI StartKit
        </div>
    </div>
</body>
</html>
