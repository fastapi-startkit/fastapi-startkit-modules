services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: database_app_test
            MYSQL_USER: app
            MYSQL_PASSWORD: secret
        ports:
            - "3306:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "--silent" ]
            interval: 5s
            timeout: 5s
            retries: 10

    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: database_app_test
            POSTGRES_USER: app
            POSTGRES_PASSWORD: secret
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD", "pg_isready", "-U", "app", "-d", "database_app_test" ]
            interval: 5s
            timeout: 5s
            retries: 10
