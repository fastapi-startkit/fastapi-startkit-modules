services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: database_app_test
            MYSQL_USER: app
            MYSQL_PASSWORD: secret
        ports:
            - "3306:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "--silent" ]
            interval: 5s
            timeout: 5s
            retries: 10

    db:
        image: postgres:16
        environment:
            POSTGRES_DB: database_app_test
            POSTGRES_USER: app
            POSTGRES_PASSWORD: secret
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U app -d database_app_test" ]
            interval: 5s
            timeout: 5s
            retries: 10

    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test: [ "CMD", "mc", "ready", "local" ]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
    minio_data:
