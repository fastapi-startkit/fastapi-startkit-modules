services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: database_app_test
            MYSQL_USER: app
            MYSQL_PASSWORD: secret
        ports:
            - "3306:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "--silent" ]
            interval: 5s
            timeout: 5s
            retries: 10
